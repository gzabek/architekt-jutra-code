databaseChangeLog:
  - changeSet:
      id: 010-seed-mcp-server-oauth2-client
      author: aj
      context: dev
      comment: Pre-register MCP server as confidential OAuth2 client for token introspection and exchange
      changes:
        - sql:
            sql: >
              INSERT INTO oauth2_registered_client
              (id, client_id, client_id_issued_at, client_secret, client_name,
               client_authentication_methods, authorization_grant_types, redirect_uris, scopes,
               created_at, updated_at)
              VALUES
              (gen_random_uuid(), 'mcp-server', CURRENT_TIMESTAMP,
               '$2a$10$kdsYFdOZvZGhotv/59JvIekfLfCooZOUhyS1Uwv39Wh2MDKbEQT22',
               'AJ MCP Server',
               ARRAY['client_secret_post', 'client_secret_basic'],
               ARRAY['urn:ietf:params:oauth:grant-type:token-exchange'],
               ARRAY[]::text[],
               ARRAY['mcp:read', 'mcp:edit'],
               CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
              ON CONFLICT (client_id) DO NOTHING
      rollback:
        - sql:
            sql: DELETE FROM oauth2_registered_client WHERE client_id = 'mcp-server'
