databaseChangeLog:
  - changeSet:
      id: 001-create-category-seq
      author: aj
      changes:
        - createSequence:
            sequenceName: category_seq
            startValue: 1
            incrementBy: 1
      rollback:
        - dropSequence:
            sequenceName: category_seq

  - changeSet:
      id: 001-create-categories-table
      author: aj
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: categories
            columnNames: name
            constraintName: uk_categories_name
      rollback:
        - dropTable:
            tableName: categories
