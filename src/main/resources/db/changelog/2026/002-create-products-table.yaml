databaseChangeLog:
  - changeSet:
      id: 002-create-product-seq
      author: aj
      changes:
        - createSequence:
            sequenceName: product_seq
            startValue: 1
            incrementBy: 1
      rollback:
        - dropSequence:
            sequenceName: product_seq

  - changeSet:
      id: 002-create-products-table
      author: aj
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(2000)
              - column:
                  name: photo_url
                  type: VARCHAR(500)
              - column:
                  name: price
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: sku
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: products
            columnNames: sku
            constraintName: uk_products_sku
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_products_category_id
        - createIndex:
            tableName: products
            indexName: idx_products_category_id
            columns:
              - column:
                  name: category_id
      rollback:
        - dropTable:
            tableName: products
