databaseChangeLog:
  - changeSet:
      id: 003-insert-sample-categories
      author: aj
      changes:
        - insert:
            tableName: categories
            columns:
              - column: { name: id, valueSequenceNext: category_seq }
              - column: { name: name, value: "Televisions" }
              - column: { name: description, value: "Smart TVs, OLED, QLED, and LED displays for home entertainment" }
              - column: { name: created_at, valueDate: "now()" }
              - column: { name: updated_at, valueDate: "now()" }
        - insert:
            tableName: categories
            columns:
              - column: { name: id, valueSequenceNext: category_seq }
              - column: { name: name, value: "Audio Systems" }
              - column: { name: description, value: "Soundbars, speakers, and home theater audio equipment" }
              - column: { name: created_at, valueDate: "now()" }
              - column: { name: updated_at, valueDate: "now()" }
        - insert:
            tableName: categories
            columns:
              - column: { name: id, valueSequenceNext: category_seq }
              - column: { name: name, value: "Smart Home" }
              - column: { name: description, value: "Smart assistants, hubs, sensors, and connected home devices" }
              - column: { name: created_at, valueDate: "now()" }
              - column: { name: updated_at, valueDate: "now()" }
        - insert:
            tableName: categories
            columns:
              - column: { name: id, valueSequenceNext: category_seq }
              - column: { name: name, value: "Networking" }
              - column: { name: description, value: "Routers, mesh systems, range extenders, and network switches" }
              - column: { name: created_at, valueDate: "now()" }
              - column: { name: updated_at, valueDate: "now()" }
        - insert:
            tableName: categories
            columns:
              - column: { name: id, valueSequenceNext: category_seq }
              - column: { name: name, value: "Home Appliances" }
              - column: { name: description, value: "Robot vacuums, air purifiers, and smart kitchen appliances" }
              - column: { name: created_at, valueDate: "now()" }
              - column: { name: updated_at, valueDate: "now()" }
      rollback:
        - delete:
            tableName: categories

  - changeSet:
      id: 003-insert-sample-products
      author: aj
      context: "!prod"
      changes:
        # Televisions
        - insert:
            tableName: products
            columns:
              - column: { name: id, valueSequenceNext: product_seq }
              - column: { name: name, value: "LG C4 65\" OLED evo 4K Smart TV" }
              - column: { name: description, value: "Self-lit OLED pixels with α9 Gen7 AI Processor, Dolby Vision and Dolby Atmos, webOS 24, 120Hz refresh rate with NVIDIA G-SYNC and AMD FreeSync support" }
              - column: { name: photo_url, value: "https://placehold.co/600x400/1a1a2e/e94560?text=LG+C4+65+OLED" }
              - column: { name: price, valueNumeric: 1799.99 }
              - column: { name: sku, value: "TV-LG-C4-65" }
              - column: { name: category_id, valueComputed: "(SELECT id FROM categories WHERE name = 'Televisions')" }
              - column: { name: created_at, valueDate: "now()" }
              - column: { name: updated_at, valueDate: "now()" }
        - insert:
            tableName: products
            columns:
              - column: { name: id, valueSequenceNext: product_seq }
              - column: { name: name, value: "Samsung 55\" S90D OLED 4K Smart TV" }
              - column: { name: description, value: "OLED HDR+ with NQ4 AI Gen2 Processor, Motion Xcelerator 144Hz, Object Tracking Sound Lite, built-in Samsung Gaming Hub and SmartThings" }
              - column: { name: photo_url, value: "https://placehold.co/600x400/1a1a2e/e94560?text=Samsung+S90D+55+OLED" }
              - column: { name: price, valueNumeric: 1299.99 }
              - column: { name: sku, value: "TV-SAM-S90D-55" }
              - column: { name: category_id, valueComputed: "(SELECT id FROM categories WHERE name = 'Televisions')" }
              - column: { name: created_at, valueDate: "now()" }
              - column: { name: updated_at, valueDate: "now()" }
        - insert:
            tableName: products
            columns:
              - column: { name: id, valueSequenceNext: product_seq }
              - column: { name: name, value: "Sony Bravia 7 75\" Mini LED 4K Smart TV" }
              - column: { name: description, value: "XR Processor with XR Backlight Master Drive, Mini LED with local dimming, Google TV, BRAVIA XR TRILUMINOS PRO display, HDMI 2.1 with 4K/120fps" }
              - column: { name: photo_url, value: "https://placehold.co/600x400/1a1a2e/e94560?text=Sony+Bravia+7+75" }
