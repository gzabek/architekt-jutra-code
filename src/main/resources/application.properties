spring.application.name=aj

# Use Podman Desktop instead of Docker
spring.docker.compose.command=podman compose
# JWT Configuration
app.jwt.expiration-ms=86400000

# OAuth2 Token Exchange - comma-separated list of allowed audience URIs
# Empty means no audiences are allowed (all exchange requests with an audience param are rejected).
# Populate this with the actual MCP server URIs that are allowed to receive Token-B.
app.oauth2.allowed-exchange-audiences=http://localhost:8081,http://localhost:8080

# Backend's own URI - used as the resource_metadata URL in WWW-Authenticate headers (RFC 9728)
app.oauth2.resource-uri=http://localhost:8080

# CORS Configuration
app.cors.allowed-origins=http://localhost:*,https://kuba-app.labs-skillpanel.com

# Liquibase
spring.liquibase.contexts=dev

# LLM configuration (LiteLLM proxy)
aj.llm.base-url=http://localhost:4000
aj.llm.model=claude-haiku-4.5
aj.llm.api-key=sk-litellm-dev-key
