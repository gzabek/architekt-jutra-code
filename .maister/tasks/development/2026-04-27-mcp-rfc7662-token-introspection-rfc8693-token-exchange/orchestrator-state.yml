    research_question: "How should our MCP server handle authentication without token passthrough, per MCP spec?"
    research_type: mixed
    confidence_level: high
  phase_summaries:
    research:
      summary: "MCP spec 2025-11-25 explicitly forbids token passthrough. Gaps identified: missing RFC 9728 PRM endpoint, missing WWW-Authenticate header on 401s, missing aud binding (RFC 8707), HMAC→RSA migration needed, token exchange audience not parameterized. ADRs accepted: RS256 signing, RFC 8693 token exchange, RFC 9728 PRM, RFC 8707 audience binding."
      key_findings:
        - "MCP server MUST act as OAuth 2.1 Resource Server - token passthrough explicitly prohibited"
        - "RFC 9728 PRM endpoint (/.well-known/oauth-protected-resource) is REQUIRED by latest spec"
        - "WWW-Authenticate header with resource_metadata must be returned on 401 responses"
        - "Tokens must have aud claim bound to MCP server URI (RFC 8707)"
        - "HMAC signing must be replaced with RSA (RS256) for JWKS publication"
        - "Token Exchange RFC 8693 already partially implemented - needs aud parameterization and allowlist"
        - "New DB column resource_uri needed in authorization_codes table"
      recommended_approach: "Embedded AS retained. Additive changes: RsaKeyConfiguration, JwksController, ProtectedResourceMetadataController, updated JwtTokenProvider (RS256), updated JwtAuthenticationFilter (NimbusJwtDecoder), SecurityConfiguration WWW-Authenticate, OAuth2AuthorizationFilter resource param, OAuth2TokenFilter aud binding, AuthorizationCodeService resource_uri column, Liquibase migration."
