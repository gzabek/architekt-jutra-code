task:
  title: Implement Plugin System
  description: >
    Implement the plugin system as described in plugin-system-design.md.
    Plugins are iframe-isolated web apps communicating with the host via postMessage RPC.
    Backend provides REST APIs for plugin registry, product plugin data, and custom objects.
    Frontend provides iframe hosting, message handling, and extension point rendering.
  status: completed
  tags: [plugin-system, backend, frontend, new-feature]
  priority: high

