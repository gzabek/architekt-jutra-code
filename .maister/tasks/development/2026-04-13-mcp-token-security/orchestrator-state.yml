task:
  title: "MCP Token Security - Replace Token Passthrough with Introspection + Token Exchange"
  description: "Implement RFC 7662 Token Introspection and RFC 8693 Token Exchange to replace the token passthrough anti-pattern in the MCP server, achieving full MCP spec compliance"
  status: in_progress
  tags: [security, mcp, authentication, oauth2]
  priority: high

task_context:
  risk_level: medium
  clarifications_resolved: true
  scope_expanded: null
  architecture_decision: null
  task_characteristics:
    has_reproducible_defect: false
    modifies_existing_code: true
    creates_new_entities: true
    involves_data_operations: false
    ui_heavy: false
  research_reference:
    path: .maister/tasks/research/2026-04-13-mcp-token-security
    research_question: "How should our MCP server handle authentication without token passthrough, per MCP spec?"
    research_type: "literature"
    confidence_level: "high"
  phase_summaries:
    research:
      summary: "Token passthrough violates 2 MUST NOT requirements. Backend OAuth2 AS is 70-80% complete. Chosen approach: RFC 7662 introspection + RFC 8693 token exchange, big-bang implementation."
      key_findings:
        - "Token passthrough explicitly forbidden by MCP spec (2 MUST NOT violations)"
        - "Backend has full OAuth2 AS: DCR, auth code+PKCE, tokens, refresh tokens, MCP scopes"
        - "Token introspection chosen over local JWT validation (no shared secret distribution)"
        - "RFC 8693 token exchange preserves user identity with audience separation"
        - "MCP SDK 0.18.1 outdated (current 1.1.1) - tracked separately"
      recommended_approach: "Big-bang: introspection + token exchange together. Backend: new OAuth2IntrospectionFilter, extend OAuth2TokenFilter with token-exchange grant, add aud claim to JwtTokenProvider. MCP Server: replace McpJwtFilter with opaque token introspection, add token exchange client, replace RestClient config."
      decisions_made:
        - "ADR-001: Token Introspection (RFC 7662) over local JWT validation"
        - "ADR-002: RFC 8693 Token Exchange for backend calls"
        - "ADR-003: Big-bang implementation (both mechanisms together)"
        - "ADR-004: Extend custom filter chain (not migrate to Spring Auth Server)"
    codebase_analysis:
        key_files:
          - src/main/java/pl/devstyle/aj/core/oauth2/OAuth2TokenFilter.java
          - src/main/java/pl/devstyle/aj/core/security/JwtTokenProvider.java
          - src/main/java/pl/devstyle/aj/core/security/SecurityConfiguration.java
          - src/main/java/pl/devstyle/aj/core/oauth2/OAuth2MetadataController.java
          - mcp-server/src/main/java/pl/devstyle/aj/mcp/security/McpJwtFilter.java
          - mcp-server/src/main/java/pl/devstyle/aj/mcp/security/AccessTokenHolder.java
          - mcp-server/src/main/java/pl/devstyle/aj/mcp/config/RestClientConfig.java
        primary_language: java
        summary: "Two-module architecture. Backend has extensible hand-rolled OAuth2 filter chain (grant dispatcher at OAuth2TokenFilter:62-69). MCP server performs zero token validation. ~15 files affected, 7 primary. Missing: aud claim, introspection endpoint, token-exchange grant. Existing OAuth2 integration tests provide regression safety net."
    clarifications: []
    gap_analysis:
        integration_points:
          - "POST /oauth2/introspect (new backend filter)"
          - "token-exchange grant in OAuth2TokenFilter dispatcher"
          - "MCP server introspection replacing McpJwtFilter"
          - "MCP server token exchange replacing JwtForwardingInterceptor"
        summary: "12 gaps identified across 2 modules. Backend: new introspection filter, token-exchange grant, aud claim, metadata updates. MCP server: replace McpJwtFilter, AccessTokenHolder, JwtForwardingInterceptor; refactor services. Medium risk, high effort."
    scope_clarifications: {scope_expanded: null, summary: null}
    ui_mockups: {components_designed: [], summary: null}
    specification:
        summary: "58 requirements across 12 sections. Backend: new OAuth2IntrospectionFilter (RFC 7662), token exchange grant in OAuth2TokenFilter (RFC 8693), aud claim in JwtTokenProvider, metadata+security config updates. MCP Server: replace McpJwtFilter with introspection, add TokenExchangeClient, replace RestClient, refactor services. 5 new components, 12 reusable."
    architecture_decision: {decision: null, summary: null}
