    research_question: "How to write a backend plugin in the aj application?"
    research_type: technical
    confidence_level: high
  phase_summaries:
    research:
      summary: "The aj application uses REST-based, out-of-process plugins. New backend logic requiring LLM integration should be implemented as a new domain package inside the aj monolith (Track C: src/main/java/pl/devstyle/aj/<domain>/). Plugins with backend server logic use Next.js API routes + server-sdk.ts pattern. For an LLM validator, either a standalone Next.js plugin server or a new monolith domain package can be used."
      key_findings:
        - "Plugin Track C (new domain in monolith) is the right choice when first-class entities are needed"
        - "Plugin Track B (Next.js + custom backend server) is preferred for external API integration, AI features"
        - "Standard entities extend BaseEntity, use Liquibase for migrations"
        - "Tests must use Testcontainers with real PostgreSQL"
        - "BAML and LiteLLM are Python-centric; Java Spring integration requires HTTP proxy or jBAML/Java client"
      recommended_approach: "Track B (Next.js backend server + server-sdk.ts) calling LiteLLM proxy, OR a new Java service in the monolith that calls LiteLLM HTTP API via WebClient"
