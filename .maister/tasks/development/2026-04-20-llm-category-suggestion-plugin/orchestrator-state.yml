  phase_summaries:
    research:
      summary: "The aj application uses a REST-based out-of-process plugin architecture. Plugins are either frontend-only (no server), full-stack (Next.js), or new domain packages added directly to the monolith Java source. For LLM integration needing server-side secrets and external API calls, Track B (plugin with custom backend server) is appropriate, combined with Track C (new domain entity) if persisting suggestions."
      key_findings:
        - "Backend plugin = Track B (Next.js server) + optionally Track C (new Java domain)"
        - "Plugin registers via PUT /api/plugins/{id}/manifest"
        - "Server-side API calls use server-sdk.ts to forward user JWT"
        - "Plugin objects stored in plugin_objects table (JSONB)"
        - "New Java domain: entity + repo + service + controller + migration + tests"
      recommended_approach: "Track B with Next.js API route calling LiteLLM/BAML, storing suggestions as plugin objects"
