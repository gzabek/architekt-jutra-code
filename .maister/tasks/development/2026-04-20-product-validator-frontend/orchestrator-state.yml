  title: Product Validator Frontend Integration
  description: >
    Change frontend code so it uses the product validator plugin.
    For a given product, call the productValidationController REST API and display labels
    based on the result of category, description and price validation.
    The frontend should still work if there is no data from the product validator plugin.
  status: in_progress
  tags: [frontend, plugin, validation]
  priority: medium

