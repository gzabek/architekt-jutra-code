task:
  title: "MCP Token Security - Token Passthrough Fix"
  description: "Research correct MCP authentication approach to replace token passthrough anti-pattern"
  status: completed
  tags: [security, mcp, authentication]
  priority: high

research_context:
  research_type: "literature"
  research_question: "How should our MCP server handle authentication without token passthrough, per MCP spec?"
  scope:
    included:
      - MCP Authorization specification
      - MCP security best practices
      - OAuth 2.0 patterns for MCP proxy servers
      - Current mcp-server implementation
      - Backend JWT infrastructure
    excluded:
      - General OAuth2 theory
      - Non-Java MCP implementations
      - Frontend/plugin auth
    constraints:
      - Existing HMAC-SHA JWT infrastructure
      - Spring Boot 4.0.5 / Spring Security 7
      - MCP SDK 0.18.1
      - Pre-alpha stage
  methodology: ["multi-source-literature-review", "codebase-gap-analysis"]
  sources: ["mcp-spec", "codebase", "external-patterns", "spring-ecosystem"]
  confidence_level: "high"
  gathering_strategy:
    categories: ["mcp-spec", "codebase", "external-patterns", "spring-ecosystem"]
    count: 4
    source: "planner"
  phase_summaries:
    phase-1:
      summary: "Token passthrough violates 2 MUST NOT requirements. Backend OAuth2 AS is 70-80% complete (DCR, auth code+PKCE, tokens, scopes). Two-phase fix recommended: (1) add JWT validation at MCP server via NimbusJwtDecoder, (2) implement RFC 8693 token exchange. MCP SDK 0.18.1 is outdated vs 1.1.1."
      steps_completed: ["step-1-init", "step-2-plan", "step-3-gather", "step-4-synthesize"]
